<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A lightweight productivity-focused browser start page with time display, focus timer, task management, and quick links">
    <title>Time Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Greeting Display Section -->
    <section class="greeting-section">
        <div class="greeting-container">
            <h1 id="greeting-text" class="greeting-text">Good morning</h1>
            <div id="time-display" class="time-display">12:00:00 AM</div>
            <div id="date-display" class="date-display">January 1, 2024</div>
        </div>
    </section>

    <!-- Focus Timer Section -->
    <section class="timer-section">
        <h2 class="section-title">Time Tracker</h2>
        <div class="timer-container">
            <div id="timer-display" class="timer-display">25:00</div>
            <div class="timer-controls">
                <button id="timer-start" class="btn btn-primary">Start</button>
                <button id="timer-stop" class="btn btn-secondary">Stop</button>
                <button id="timer-reset" class="btn btn-secondary">Reset</button>
            </div>
        </div>
    </section>

    <!-- Task List Section -->
    <section class="tasks-section">
        <h2 class="section-title">Tasks</h2>
        <div class="task-input-container">
            <input 
                type="text" 
                id="task-input" 
                class="task-input" 
                placeholder="Add a new task..."
                aria-label="New task input"
            >
            <button id="task-add" class="btn btn-primary">Add</button>
        </div>
        <ul id="task-list" class="task-list"></ul>
    </section>

    <!-- Quick Links Section -->
    <section class="links-section">
        <h2 class="section-title">Quick Links</h2>
        <div class="link-input-container">
            <input 
                type="text" 
                id="link-name-input" 
                class="link-input" 
                placeholder="Link name..."
                aria-label="Link name input"
            >
            <input 
                type="url" 
                id="link-url-input" 
                class="link-input" 
                placeholder="URL (https://...)..."
                aria-label="Link URL input"
            >
            <button id="link-add" class="btn btn-primary">Add</button>
        </div>
        <div id="links-container" class="links-container"></div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
